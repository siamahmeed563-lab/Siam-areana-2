<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width,initial-scale=1">

<title>Siam Arena V4</title>

<meta name="theme-color"
content="#0b1220">

<meta name="description"
content="Siam Arena Ultimate Live TV">

<link rel="preconnect"
href="https://fonts.googleapis.com">

<link rel="preconnect"
href="https://fonts.gstatic.com"
crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<script src="https://cdn.jsdelivr.net/npm/mpegts.js@latest/dist/mpegts.min.js"></script>

<style>

*{

margin:0;

padding:0;

box-sizing:border-box;

font-family:Poppins,sans-serif;

}

body{

background:#050b18;

color:white;

overflow-x:hidden;

}

header{

padding:16px;

background:#09101f;

display:flex;

justify-content:space-between;

align-items:center;

border-bottom:1px solid rgba(255,255,255,.05);

}

.logo{

font-size:26px;

font-weight:700;

color:#00d4ff;

}

.telegram{

background:#0088cc;

padding:10px 16px;

border-radius:12px;

text-decoration:none;

color:#fff;

font-size:14px;

font-weight:600;

}

.player-box{

padding:18px;

}

.player{

width:100%;

aspect-ratio:16/9;

border-radius:18px;

overflow:hidden;

background:black;

}

video{

width:100%;

height:100%;

background:black;

}

.search{

padding:20px;

}

.search input{

width:100%;

padding:14px;

border:none;

border-radius:14px;

background:#111c33;

color:white;

outline:none;

font-size:15px;

}

.section-title{

padding:20px;

font-size:22px;

font-weight:700;

}

.channels{

display:grid;

grid-template-columns:

repeat(auto-fill,minmax(170px,1fr));

gap:15px;

padding:20px;

}

.channel{

background:#111c33;

border-radius:18px;

padding:15px;

cursor:pointer;

transition:.3s;

text-align:center;

}

.channel:hover{

transform:translateY(-4px);

}

.channel img{

width:65px;

height:65px;

border-radius:50%;

object-fit:cover;

margin-bottom:10px;

}

.channel h4{

font-size:14px;

font-weight:600;

}

.worldcup{

margin:20px;

padding:20px;

background:#10182b;

border-radius:18px;

}

.worldcup h3{

margin-bottom:10px;

}

.standing{

padding:20px;

}

.table{

overflow:auto;

background:#111c33;

border-radius:16px;

padding:12px;

}

table{

width:100%;

border-collapse:collapse;

}

th{

padding:12px;

background:#16223d;

}

td{

padding:12px;

text-align:center;

border-bottom:1px solid rgba(255,255,255,.04);

}

.footer{

padding:30px;

text-align:center;

opacity:.7;

font-size:13px;

}

button{

cursor:pointer;

}

</style>

</head>

<body>

<header>

<div class="logo">

SIAM ARENA

</div>

<a class="telegram"

href="#">

Telegram

</a>

</header>

<div class="player-box">

<div class="player">

<video id="video"

controls

playsinline>

</video>

</div>

</div>

<div class="search">

<input

id="search"

placeholder="Search channel">

</div>

<div class="section-title">

Live Channels

</div>

<div id="channels"

class="channels">

Loading...

</div>

<div class="worldcup">

<h3>

World Cup 2026

</h3>

<p>

Live Fixtures

Standings

Highlights

Available

</p>

</div>

<div class="standing">

<div class="table">

<table>

<tr>

<th>Team</th>

<th>P</th>

<th>Pts</th>

</tr>

<tr>

<td>Argentina</td>

<td>3</td>

<td>9</td>

</tr>

<tr>

<td>Brazil</td>

<td>3</td>

<td>7</td>

</tr>

<tr>

<td>Spain</td>

<td>3</td>

<td>6</td>

</tr>

</table>

</div>
<div class="section-title">

World Cup Fixtures

</div>

<div class="channels">

<div class="channel">

<h4>

Argentina vs Brazil

</h4>

</div>

<div class="channel">

<h4>

Spain vs France

</h4>

</div>

<div class="channel">

<h4>

England vs Germany

</h4>

</div>

</div>

<div class="footer">

SIAM ARENA V4 Ultimate

</div>

<script>

let channels=[];

let currentIndex=0;

let hls=null;

let tsPlayer=null;

const video=

document.getElementById("video");

async function loadChannels(){

try{

const res=

await fetch("channels.json");

channels=

await res.json();

renderChannels(channels);

}catch(e){

console.log(e);

}

}

function renderChannels(list){

const wrap=

document.getElementById(

"channels"

);

wrap.innerHTML="";

list.forEach(

(ch,i)=>{

wrap.innerHTML+=`

<div class="channel"

onclick="playChannel(${i})">

<img src="${ch.logo}"

onerror="this.style.display='none'">

<h4>

${ch.name}

</h4>

</div>

`;

});

}

function destroyPlayer(){

if(hls){

hls.destroy();

hls=null;

}

if(tsPlayer){

tsPlayer.destroy();

tsPlayer=null;

}

}

function playChannel(i){

currentIndex=i;

play(

channels[i].url

);

}

function play(url){

destroyPlayer();

video.pause();

video.removeAttribute(

"src"

);

video.load();

if(

url.includes(

".m3u8"

)

){

if(

Hls.isSupported()

){

hls=new Hls({

enableWorker:true,

lowLatencyMode:true

});

hls.loadSource(

url

);

hls.attachMedia(

video

);

hls.on(

Hls.Events.

MANIFEST_PARSED,

()=>{

video.play();

}

);

}else{

video.src=url;

video.play();

}

}

else if(

url.includes(

".ts"

)

){

if(

window.mpegts

){

tsPlayer=

mpegts.createPlayer({

type:"mse",

url:url,

isLive:true

});

tsPlayer

.attachMediaElement(

video

);

tsPlayer.load();

tsPlayer.play();

}

else{

video.src=url;

video.play();

}

}

else{

video.src=url;

video.play();

}

saveHistory(url);

}

function nextChannel(){

currentIndex++;

if(

currentIndex>=

channels.length

){

currentIndex=0;

}

playChannel(

currentIndex

);

}

function prevChannel(){

currentIndex--;

if(

currentIndex<0

){

currentIndex=

channels.length-1;

}

playChannel(

currentIndex

);

}

function fullscreen(){

video.requestFullscreen();

}

async function pip(){

if(

document.pictureInPictureEnabled

){

await

video.requestPictureInPicture();

}

}

function share(){

navigator.share({

title:

"Siam Arena",

url:

location.href

});

}

function saveHistory(url){

localStorage.setItem(

"lastStream",

url

);

}

function continueWatch(){

const x=

localStorage.getItem(

"lastStream"

);

if(x){

play(x);

}

}

document

.getElementById(

"search"

)

.addEventListener(

"input",

e=>{

const q=

e.target.value

.toLowerCase();

const f=

channels.filter(

x=>

x.name

.toLowerCase()

.includes(q)

);

renderChannels(

f

);

}

);

loadChannels();

continueWatch();

</script>

<div style="position:fixed;

bottom:20px;

right:20px;

display:flex;

gap:10px">

<button

onclick="prevChannel()">

◀

</button>

<button

onclick="nextChannel()">

▶

</button>

<button

onclick="fullscreen()">

⛶

</button>

<button

onclick="pip()">

PiP

</button>

<button

onclick="share()">

Share

</button>

</div>

</body>

</html>
</div>
