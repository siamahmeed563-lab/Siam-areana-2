<!-- IPTV SERVER PLAYLIST URLs - 12টি সার্ভার -->
<script>
// 🌍 সম্পূর্ণ IPTV সার্ভার লিস্ট
const IPTV_PLAYLISTS = [
  "https://raw.githubusercontent.com/bdtechexpert/live-tv-playlist/refs/heads/main/live-tv-playlist.m3u",
  "https://iptv-org.github.io/iptv/index.m3u",
  "https://raw.githubusercontent.com/abusaeeidx/Mrgify-Tv/refs/heads/main/playlist.m3u",
  "https://raw.githubusercontent.com/abusaeeidx/Ayna-BDIX-IPTV-Playlist/refs/heads/main/ayna-playlist.m3u",    
  "https://raw.githubusercontent.com/abusaeeidx/T-Sports-Playlist-Auto-Update/refs/heads/main/combine_playlist.m3u",
  "https://raw.githubusercontent.com/sydul104/main04/refs/heads/main/my",       
  "https://raw.githubusercontent.com/v5on/filoox-bdix-selected/refs/heads/main/playlist.m3u",
  "https://raw.githubusercontent.com/Koshwefull/Koshwefull/refs/heads/main/infosat.m3u",
  "https://raw.githubusercontent.com/jnk22k/kodibig/master/newbig",
  "https://raw.githubusercontent.com/gofilme/iptv/master/iptv.m3u",
  "https://raw.githubusercontent.com/vod-player/iptv-global/master/global.m3u8",
  "https://raw.githubusercontent.com/luanhenriques/iptv-org/master/iptv.m3u",
];

const SERVER_NAMES = [
  "📺 Server 1 (BD Live TV)",
  "📺 Server 2 (IPTV Org Global)",
  "📺 Server 3 (Mrgify TV)",
  "📺 Server 4 (Ayna BDIX)",
  "📺 Server 5 (T-Sports)",
  "📺 Server 6 (Sydul)",
  "📺 Server 7 (Filoox BDIX)",
  "📺 Server 8 (Infosat)",
  "📺 Server 9 (KodiBig)",
  "📺 Server 10 (Gofilme)",
  "📺 Server 11 (VOD Player Global)",
  "📺 Server 12 (IPTV Org Master)",
];

let currentIPTVServer = 0;

// IPTV Server লোড করার ফাংশন
function loadIPTVServer(index) {
  currentIPTVServer = parseInt(index);
  if (currentIPTVServer < 0 || currentIPTVServer >= IPTV_PLAYLISTS.length) return;
  
  const url = IPTV_PLAYLISTS[currentIPTVServer];
  const btn = document.getElementById('iptvServerBtn');
  if (btn) btn.textContent = SERVER_NAMES[currentIPTVServer] + ' 🔄';
  
  fetch(url, {cache: "no-store"})
    .then(r => r.text())
    .then(text => parseM3UAndFill(text))
    .catch(err => console.error('IPTV লোড ব্যর্থ:', err));
}

// M3U ফাইল পার্স করা
function parseM3UAndFill(m3uContent) {
  const lines = m3uContent.split(/\r?\n/);
  const channels = [];
  
  for (let i = 0; i < lines.length; i++) {
    if (lines[i].startsWith("#EXTINF")) {
      const nameMatch = lines[i].match(/,(.*)$/);
      const logoMatch = lines[i].match(/tvg-logo="([^"]*)"/);
      const groupMatch = lines[i].match(/group-title="([^"]*)"/);
      
      const name = nameMatch ? nameMatch[1].trim() : "Unknown";
      const logo = logoMatch ? logoMatch[1] : "📺";
      const group = groupMatch ? groupMatch[1] : "Other";
      const url = lines[i + 1] || "";
      
      if (url.startsWith("http")) {
        channels.push({ name, icon: logo, url, sub: group });
      }
    }
  }
  
  // চ্যানেল প্রদর্শন
  const container = document.getElementById('iptv-channels');
  if (container) {
    container.innerHTML = channels.map((ch, i) => {
      const q = (s) => (s||'').replace(/\\/g,'\\\\').replace(/'/g,"\\'");
      return '<div class="ch-card" onclick="playC(\''+q(ch.icon + ' ' + ch.name)+'\',\''+q(ch.url)+'\')" style="cursor:pointer;transition:0.2s;border-radius:10px;padding:10px;background:#141d2e;text-align:center;">'
        +'<div class="ch-icon" style="font-size:2rem;margin-bottom:5px;">'+ch.icon+'</div>'
        +'<div class="ch-info"><div class="ch-name" style="font-size:12px;font-weight:600;color:#f0f4ff;">'+ch.name+'</div>'
        +'<div class="ch-sub" style="font-size:10px;color:#8892a4;">'+ch.sub+'</div></div>'
        +'<button class="ch-play" style="margin-top:5px;background:#ff3d3d;color:white;border:none;padding:5px 10px;border-radius:5px;cursor:pointer;font-weight:600;">▶ Play</button></div>';
    }).join('');
    container.style.display = 'grid';
    container.style.gridTemplateColumns = 'repeat(auto-fill, minmax(100px, 1fr))';
    container.style.gap = '10px';
    container.style.marginBottom = '20px';
  }
}

// Server সিলেক্টর HTML এ যুক্ত করা
document.addEventListener('DOMContentLoaded', function() {
  const iptvServerBtn = document.getElementById('iptvServerBtn');
  if (iptvServerBtn) {
    iptvServerBtn.addEventListener('click', function() {
      const serverModal = document.getElementById('iptv-server-modal');
      if (serverModal) serverModal.style.display = 'flex';
    });
  }
});

// Server মডাল বন্ধ করা
function closeIPTVModal() {
  const modal = document.getElementById('iptv-server-modal');
  if (modal) modal.style.display = 'none';
}
</script>

<!-- IPTV SERVER MODAL -->
<style>

  display: none;

  top: 0;

  width: 100%;

  justify-content: center;
  align-items: center;
  z-index: 9999;
}

.iptv-modal-content {
  background: #141d2e;

}

.iptv-server-btn {

}

}

  font-weight: bold;

</style>

<!-- IPTV Server Modal HTML -->
<div id="iptv-server-modal">
  <div class="iptv-modal-content" style="position:relative;">
    <button class="iptv-close-modal" onclick="closeIPTVModal()">✕</button>
    <h3>📺 IPTV সার্ভার নির্বাচন করুন</h3>
    <button class="iptv-server-btn" onclick="loadIPTVServer(0);closeIPTVModal();">📺 Server 1 (BD Live TV)</button>
    <button class="iptv-server-btn" onclick="loadIPTVServer(1);closeIPTVModal();">📺 Server 2 (IPTV Org Global)</button>
    <button class="iptv-server-btn" onclick="loadIPTVServer(2);closeIPTVModal();">📺 Server 3 (Mrgify TV)</button>
    <button class="iptv-server-btn" onclick="loadIPTVServer(3);closeIPTVModal();">📺 Server 4 (Ayna BDIX)</button>
    <button class="iptv-server-btn" onclick="loadIPTVServer(4);closeIPTVModal();">📺 Server 5 (T-Sports)</button>
    <button class="iptv-server-btn" onclick="loadIPTVServer(5);closeIPTVModal();">📺 Server 6 (Sydul)</button>
    <button class="iptv-server-btn" onclick="loadIPTVServer(6);closeIPTVModal();">📺 Server 7 (Filoox BDIX)</button>
    <button class="iptv-server-btn" onclick="loadIPTVServer(7);closeIPTVModal();">📺 Server 8 (Infosat)</button>
    <button class="iptv-server-btn" onclick="loadIPTVServer(8);closeIPTVModal();">📺 Server 9 (KodiBig)</button>
    <button class="iptv-server-btn" onclick="loadIPTVServer(9);closeIPTVModal();">📺 Server 10 (Gofilme)</button>
    <button class="iptv-server-btn" onclick="loadIPTVServer(10);closeIPTVModal();">📺 Server 11 (VOD Player Global)</button>
    <button class="iptv-server-btn" onclick="loadIPTVServer(11);closeIPTVModal();">📺 Server 12 (IPTV Org Master)</button>
  </div>
</div>

<!-- IPTV Channels Display Container -->
<div id="iptv-channels" style="display:none;"></div>
