<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Siam Arena - Live Sports</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/hls.js/1.5.7/hls.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #0a0a0f;
      --surface: #12121a;
      --card: #1a1a26;
      --card-hover: #22223a;
      --accent: #e63946;
      --accent2: #f4a261;
      --text: #eaeaff;
      --muted: #8888aa;
      --border: #2a2a40;
      --live: #22c55e;
    }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* HEADER */
    header {
      background: linear-gradient(135deg, #0a0a0f 0%, #1a0a1a 100%);
      border-bottom: 2px solid var(--accent);
      padding: 14px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .logo {
      font-size: 1.5rem;
      font-weight: 900;
      letter-spacing: -0.5px;
      color: var(--text);
    }
    .logo span { color: var(--accent); }
    .live-badge {
      background: var(--live);
      color: #000;
      font-size: 0.7rem;
      font-weight: 800;
      padding: 3px 8px;
      border-radius: 4px;
      letter-spacing: 1px;
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.6; }
    }

    /* LAYOUT */
    .container { display: flex; height: calc(100vh - 57px); }

    /* SIDEBAR */
    .sidebar {
      width: 280px;
      min-width: 280px;
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .sidebar-header {
      padding: 14px 16px;
      border-bottom: 1px solid var(--border);
    }
    .search-box {
      width: 100%;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      padding: 8px 12px;
      font-size: 0.85rem;
      outline: none;
      transition: border-color 0.2s;
    }
    .search-box:focus { border-color: var(--accent); }
    .search-box::placeholder { color: var(--muted); }

    .category-tabs {
      display: flex;
      gap: 6px;
      padding: 10px 16px;
      overflow-x: auto;
      border-bottom: 1px solid var(--border);
      scrollbar-width: none;
    }
    .category-tabs::-webkit-scrollbar { display: none; }
    .cat-btn {
      background: var(--card);
      border: 1px solid var(--border);
      color: var(--muted);
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 0.75rem;
      cursor: pointer;
      white-space: nowrap;
      transition: all 0.2s;
    }
    .cat-btn.active, .cat-btn:hover {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }

    .channel-list {
      overflow-y: auto;
      flex: 1;
      scrollbar-width: thin;
      scrollbar-color: var(--border) transparent;
    }
    .channel-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 16px;
      cursor: pointer;
      border-bottom: 1px solid var(--border);
      transition: background 0.15s;
      position: relative;
    }
    .channel-item:hover { background: var(--card-hover); }
    .channel-item.active {
      background: var(--card-hover);
      border-left: 3px solid var(--accent);
    }
    .ch-logo {
      width: 40px;
      height: 40px;
      border-radius: 8px;
      background: var(--card);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      flex-shrink: 0;
      font-size: 0.7rem;
      color: var(--muted);
      font-weight: 700;
    }
    .ch-logo img { width: 100%; height: 100%; object-fit: contain; }
    .ch-info { flex: 1; min-width: 0; }
    .ch-name {
      font-size: 0.9rem;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .ch-cat {
      font-size: 0.72rem;
      color: var(--muted);
      margin-top: 2px;
    }
    .ch-streams-count {
      font-size: 0.7rem;
      color: var(--accent2);
      background: rgba(244,162,97,0.1);
      padding: 2px 6px;
      border-radius: 10px;
    }

    /* PLAYER AREA */
    .player-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .player-wrapper {
      position: relative;
      background: #000;
      aspect-ratio: 16/9;
      max-height: 65%;
      width: 100%;
    }
    #player {
      width: 100%;
      height: 100%;
      display: block;
      background: #000;
    }
    .player-overlay {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 12px;
      background: rgba(0,0,0,0.85);
    }
    .overlay-icon { font-size: 3rem; }
    .overlay-text { color: var(--muted); font-size: 0.9rem; text-align: center; padding: 0 20px; }

    /* NOW PLAYING INFO */
    .now-playing {
      background: var(--surface);
      border-top: 1px solid var(--border);
      padding: 14px 20px;
    }
    .np-top {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 10px;
    }
    .np-title { font-size: 1.1rem; font-weight: 700; }
    .np-cat {
      font-size: 0.75rem;
      color: var(--accent2);
      background: rgba(244,162,97,0.1);
      padding: 2px 8px;
      border-radius: 10px;
    }
    .stream-selector {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    .stream-btn {
      background: var(--card);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 6px 14px;
      border-radius: 6px;
      font-size: 0.8rem;
      cursor: pointer;
      transition: all 0.2s;
    }
    .stream-btn:hover { border-color: var(--accent); color: var(--accent); }
    .stream-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; font-weight: 600; }

    /* STATUS BAR */
    .status-bar {
      padding: 8px 20px;
      background: var(--bg);
      border-top: 1px solid var(--border);
      font-size: 0.78rem;
      color: var(--muted);
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .status-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--muted);
    }
    .status-dot.ok { background: var(--live); }
    .status-dot.err { background: var(--accent); }
    .status-dot.loading {
      background: var(--accent2);
      animation: pulse 1s infinite;
    }

    /* CORS WARNING */
    .cors-notice {
      background: rgba(230,57,70,0.08);
      border: 1px solid rgba(230,57,70,0.3);
      border-radius: 8px;
      padding: 10px 14px;
      margin: 10px 20px;
      font-size: 0.8rem;
      color: #ff8891;
      display: none;
    }
    .cors-notice.show { display: block; }

    /* MOBILE */
    @media (max-width: 768px) {
      .container { flex-direction: column; height: auto; }
      .sidebar { width: 100%; min-width: unset; height: auto; max-height: 45vh; }
      .player-area { flex: 1; }
      .player-wrapper { max-height: unset; aspect-ratio: 16/9; }
    }
  </style>
</head>
<body>

<header>
  <div class="logo">Siam <span>Arena</span></div>
  <span class="live-badge">● LIVE</span>
</header>

<div class="container">
  <!-- SIDEBAR -->
  <div class="sidebar">
    <div class="sidebar-header">
      <input class="search-box" type="text" placeholder="🔍 Channel খুঁজুন..." id="searchInput" oninput="filterChannels()" />
    </div>
    <div class="category-tabs" id="catTabs"></div>
    <div class="channel-list" id="channelList"></div>
  </div>

  <!-- PLAYER AREA -->
  <div class="player-area">
    <div class="player-wrapper">
      <video id="player" controls playsinline></video>
      <div class="player-overlay" id="overlay">
        <div class="overlay-icon">📺</div>
        <div class="overlay-text">বাম দিক থেকে একটি channel select করুন</div>
      </div>
    </div>

    <div class="now-playing" id="nowPlaying" style="display:none">
      <div class="np-top">
        <div class="np-title" id="npTitle">—</div>
        <div class="np-cat" id="npCat">—</div>
        <span class="live-badge" style="font-size:0.65rem">● LIVE</span>
      </div>
      <div class="stream-selector" id="streamSelector"></div>
    </div>

    <div class="cors-notice" id="corsNotice">
      ⚠️ এই stream-এ CORS সমস্যা হতে পারে। যদি video না চলে, তাহলে আপনার server-এ একটি proxy বসাতে হবে অথবা browser-এর CORS extension ব্যবহার করুন।
    </div>

    <div class="status-bar">
      <div class="status-dot" id="statusDot"></div>
      <span id="statusText">কোনো channel select করা হয়নি</span>
    </div>
  </div>
</div>

<script>
// ──────────────────────────────────────────
// Load channels.json (same folder) অথবা inline fallback
// ──────────────────────────────────────────
const INLINE_CHANNELS = [
  { id:1, name:"T Sports", logo:"https://upload.wikimedia.org/wikipedia/en/thumb/9/95/T_Sports_logo.png/250px-T_Sports_logo.png", category:"Sports", streams:[{label:"HD",url:"http://198.195.239.50:8095/tsports/tracks-v1a1/mono.m3u8",type:"m3u8"}] },
  { id:2, name:"Willow Extra", logo:"https://upload.wikimedia.org/wikipedia/commons/thumb/2/2a/Willow_TV_logo.png/250px-Willow_TV_logo.png", category:"Cricket", streams:[{label:"HD",url:"http://27.124.71.27/Willow_Extra/index.m3u8",type:"m3u8"}] },
  { id:3, name:"Fox Sports 1", logo:"https://upload.wikimedia.org/wikipedia/commons/thumb/1/1e/Fox_Sports_1_logo.svg/250px-Fox_Sports_1_logo.svg.png", category:"Sports", streams:[{label:"HD",url:"http://41.223.30.230/FOXSPORTS1/index.m3u8",type:"m3u8"}] },
  { id:4, name:"beIN Sports", logo:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4d/Bein_sports_logo.svg/250px-Bein_sports_logo.svg.png", category:"Football", streams:[{label:"720p",url:"https://d9ssxzmclhfo4.cloudfront.net/bein_sports720p.m3u8",type:"m3u8"}] },
  { id:5, name:"Channel 5", logo:"", category:"General", streams:[{label:"SD",url:"http://103.157.248.140:8000/play/a05x/index.m3u8",type:"m3u8"}] },
  { id:6, name:"Channel 6", logo:"", category:"General", streams:[{label:"SD",url:"http://190.108.83.69:8000/play/a05w/index.m3u8",type:"m3u8"}] },
  { id:7, name:"RTBGO Live", logo:"", category:"General", streams:[{label:"FHD",url:"https://d1211whpimeups.cloudfront.net/smil:rtbgo/chunklist.m3u8",type:"m3u8"}] },
  { id:8, name:"OTT Club Ch1", logo:"", category:"Sports", streams:[{label:"HD",url:"http://ytoxw6un.ottclub.xyz/iptv/KCUHA6DGYYVA8ZZFUPQV3KZH/6408/index.m3u8",type:"m3u8"}] },
  { id:9, name:"OTT Club Ch2", logo:"", category:"Sports", streams:[{label:"HD",url:"http://ytoxw6un.ottclub.xyz/iptv/VSQZTL9D68WBD9/6126/index.m3u8",type:"m3u8"}] },
  { id:10, name:"StarHub Live", logo:"", category:"Sports", streams:[{label:"Stream 1",url:"http://starhub.pro/live/farhat-3379/67897-913379/742610.ts",type:"ts"},{label:"Stream 2",url:"http://starhub.pro/live/farhat-3379/67897-913379/744523.ts",type:"ts"},{label:"Stream 3",url:"http://starhub.pro/live/farhat-3379/67897-913379/741567.ts",type:"ts"}] },
  { id:11, name:"RGKKW Live", logo:"", category:"Sports", streams:[{label:"Stream 1",url:"http://rgkkw.live/live/1Aoen7elp5/IgMJ60tmAa/745149.ts",type:"ts"},{label:"Stream 2",url:"http://rgkkw.live/live/1Aoen7elp5/IgMJ60tmAa/741566.ts",type:"ts"}] },
  { id:12, name:"UA Online", logo:"", category:"General", streams:[{label:"HD",url:"http://ua.online24.pm/play/1103/350B326FB34F4B8/video.m3u8",type:"m3u8"}] },
  { id:13, name:"OpenSource FHD", logo:"", category:"General", streams:[{label:"60fps FHD",url:"https://fhd60fps-by-opensourecflix.exmax.workers.dev/index.m3u8",type:"m3u8"}] }
];

let allChannels = [];
let currentCategory = "All";
let activeChannelId = null;
let hls = null;

async function init() {
  try {
    const resp = await fetch('channels.json');
    if (resp.ok) {
      const data = await resp.json();
      allChannels = data.channels;
    } else { throw new Error(); }
  } catch {
    allChannels = INLINE_CHANNELS;
  }
  buildCategories();
  renderChannels();
}

function buildCategories() {
  const cats = ["All", ...new Set(allChannels.map(c => c.category))];
  const tabs = document.getElementById('catTabs');
  tabs.innerHTML = cats.map(cat =>
    `<button class="cat-btn ${cat === 'All' ? 'active' : ''}" onclick="selectCategory('${cat}')">${cat}</button>`
  ).join('');
}

function selectCategory(cat) {
  currentCategory = cat;
  document.querySelectorAll('.cat-btn').forEach(b => {
    b.classList.toggle('active', b.textContent === cat);
  });
  renderChannels();
}

function filterChannels() {
  renderChannels();
}

function renderChannels() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  const list = document.getElementById('channelList');
  const filtered = allChannels.filter(c => {
    const matchCat = currentCategory === 'All' || c.category === currentCategory;
    const matchQ = !q || c.name.toLowerCase().includes(q);
    return matchCat && matchQ;
  });

  list.innerHTML = filtered.map(ch => `
    <div class="channel-item ${ch.id === activeChannelId ? 'active' : ''}" onclick="selectChannel(${ch.id})">
      <div class="ch-logo">
        ${ch.logo
          ? `<img src="${ch.logo}" alt="${ch.name}" onerror="this.parentElement.textContent='${ch.name.charAt(0)}'">`
          : `<span>${ch.name.charAt(0)}</span>`}
      </div>
      <div class="ch-info">
        <div class="ch-name">${ch.name}</div>
        <div class="ch-cat">${ch.category}</div>
      </div>
      ${ch.streams.length > 1 ? `<span class="ch-streams-count">${ch.streams.length} streams</span>` : ''}
    </div>
  `).join('');
}

function selectChannel(id) {
  activeChannelId = id;
  const ch = allChannels.find(c => c.id === id);
  if (!ch) return;

  renderChannels(); // update active state

  document.getElementById('overlay').style.display = 'none';
  document.getElementById('nowPlaying').style.display = 'block';
  document.getElementById('npTitle').textContent = ch.name;
  document.getElementById('npCat').textContent = ch.category;

  // Build stream buttons
  const sel = document.getElementById('streamSelector');
  sel.innerHTML = ch.streams.map((s, i) =>
    `<button class="stream-btn ${i === 0 ? 'active' : ''}" onclick="playStream(${id}, ${i}, this)">${s.label}</button>`
  ).join('');

  playStream(id, 0, sel.querySelector('.stream-btn'));
}

function playStream(channelId, streamIndex, btn) {
  document.querySelectorAll('.stream-btn').forEach(b => b.classList.remove('active'));
  if (btn) btn.classList.add('active');

  const ch = allChannels.find(c => c.id === channelId);
  if (!ch) return;
  const stream = ch.streams[streamIndex];

  setStatus('loading', `Loading: ${ch.name} — ${stream.label}...`);
  document.getElementById('corsNotice').classList.remove('show');

  const video = document.getElementById('player');

  // Destroy old HLS instance
  if (hls) { hls.destroy(); hls = null; }

  const url = stream.url;

  if (stream.type === 'ts') {
    // Direct TS — try native
    video.src = url;
    video.play().then(() => setStatus('ok', `✓ Playing: ${ch.name}`))
      .catch(() => {
        setStatus('err', 'Stream চলছে না — CORS বা server issue');
        document.getElementById('corsNotice').classList.add('show');
      });
    return;
  }

  // HLS stream
  if (Hls.isSupported()) {
    hls = new Hls({
      enableWorker: true,
      lowLatencyMode: true,
      backBufferLength: 90
    });
    hls.loadSource(url);
    hls.attachMedia(video);
    hls.on(Hls.Events.MANIFEST_PARSED, () => {
      video.play().then(() => setStatus('ok', `✓ Playing: ${ch.name} — ${stream.label}`))
        .catch(e => setStatus('err', 'Autoplay blocked — play বাটন চাপুন'));
    });
    hls.on(Hls.Events.ERROR, (event, data) => {
      if (data.fatal) {
        setStatus('err', `Stream error: ${data.type}`);
        document.getElementById('corsNotice').classList.add('show');
      }
    });
  } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
    // Safari native HLS
    video.src = url;
    video.play().catch(() => setStatus('err', 'Playback error'));
  } else {
    setStatus('err', 'আপনার browser HLS support করে না');
  }
}

function setStatus(type, msg) {
  const dot = document.getElementById('statusDot');
  dot.className = 'status-dot ' + type;
  document.getElementById('statusText').textContent = msg;
}

init();
</script>
</body>
</html>
